<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redirecting...</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 24px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }

    .url {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.6;
      word-break: break-all;
    }
  </style>

  <script>
    (function () {
      const targetBase = "https://keeva.skysize.io";

      const path = window.location.pathname || "";
      const query = window.location.search || "";
      const hash = window.location.hash || "";

      const targetUrl = targetBase + path + query + hash;

      // Set fallback link
      window.onload = function () {
        const btn = document.getElementById("redirectBtn");
        const urlText = document.getElementById("targetUrl");

        btn.href = targetUrl;
        urlText.textContent = targetUrl;
      };

      // Try automatic redirect
      setTimeout(() => {
        window.location.replace(targetUrl);
      }, 50);
    })();
  </script>
</head>

<body>
  <div class="card">
    <h1>Redirecting…</h1>
    <p>You’re being sent to the new location.</p>

    <a id="redirectBtn" class="btn" href="#">Continue</a>

    <div id="targetUrl" class="url"></div>
  </div>
</body>
</html>
