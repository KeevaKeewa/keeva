<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loading...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #0f172a;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Optional: subtle loading indicator while iframe is loading */
    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      flex-direction: column;
      z-index: 10;
      transition: opacity 0.6s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Fullscreen iframe with your static page -->
  <iframe id="staticFrame" src="static/index.html" title="Loading interface"></iframe>

  <!-- Optional loading overlay (shown until iframe content loads) -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <div>Warming up the application...</div>
    <div style="margin-top: 12px; font-size: 14px; opacity: 0.7;">This may take a moment</div>
  </div>

  <script>
    (function () {
      const targetBase = "https://keeva.skysize.io";
      const path = window.location.pathname || "";
      const query = window.location.search || "";
      const hash = window.location.hash || "";
      const targetUrl = targetBase + path + query + hash;

      // Try to redirect automatically after a short delay
      // (You can increase this if the backend needs more warm-up time)
      setTimeout(() => {
        window.location.replace(targetUrl);
      }, 800);   // ← adjust this value (in milliseconds) as needed

      // Optional: Hide the loading overlay once the static iframe has loaded
      const iframe = document.getElementById('staticFrame');
      const overlay = document.getElementById('loadingOverlay');

      iframe.onload = function () {
        // Give the iframe a tiny bit of time to render nicely
        setTimeout(() => {
          overlay.classList.add('hidden');
        }, 300);
      };

      // Fallback: if iframe fails to load, still attempt redirect
      iframe.onerror = function () {
        window.location.replace(targetUrl);
      };
    })();
  </script>
</body>
</html>
