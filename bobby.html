<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loading...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #0f172a;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Optional: Loading indicator while iframe loads */
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 18px;
      opacity: 0.7;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Optional loading text (disappears once iframe loads) -->
  <div class="loading" id="loading">Loading application...</div>

  <iframe 
    id="appFrame"
    src="static/index.html"
    allowfullscreen
    allow="fullscreen; accelerometer; gyroscope; magnetometer; camera; microphone; clipboard-write"
  ></iframe>

  <script>
    const iframe = document.getElementById('appFrame');
    const loading = document.getElementById('loading');

    // Hide loading indicator once iframe finishes loading
    iframe.onload = function () {
      loading.style.opacity = '0';
      setTimeout(() => {
        loading.style.display = 'none';
      }, 600);
    };

    // Optional: Handle errors if static/index.html fails to load
    iframe.onerror = function () {
      loading.textContent = "Failed to load application. Please refresh.";
      loading.style.color = "#ef4444";
    };
  </script>

</body>
</html>
