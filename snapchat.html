<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryQueue • Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .dropzone {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .dropzone-active {
            background-color: #111111;
            border-color: #fffc00;
            transform: scale(1.02);
        }
        
        .success-pop {
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-auto px-6 py-12">
        
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-[#fffc00] rounded-2xl flex items-center justify-center text-black text-2xl shadow-inner">📸</div>
                <h1 class="title-font text-3xl tracking-tighter">StoryQueue</h1>
            </div>
            <div class="px-4 py-1.5 bg-white/10 text-white text-xs font-medium rounded-3xl flex items-center gap-x-1">
                <div class="w-2 h-2 bg-[#fffc00] rounded-full animate-pulse"></div>
                LIVE
            </div>
        </div>
        
        <div class="text-center mb-8">
            <h2 class="text-4xl font-semibold tracking-tighter title-font mb-2">Drop your moment</h2>
            <p class="text-zinc-400 text-lg">Your photo will instantly join the queue.<br>Only the app can see or delete it.</p>
        </div>
        
        <!-- Main Upload Card -->
        <div id="upload-card" class="bg-zinc-900 rounded-3xl p-8 shadow-2xl border border-white/10">
            
            <!-- Dropzone -->
            <div id="dropzone" 
                 class="dropzone border-2 border-dashed border-zinc-700 hover:border-[#fffc00]/70 rounded-3xl h-72 flex flex-col items-center justify-center text-center cursor-pointer">
                <input type="file" id="file-input" accept="image/png, image/jpeg, image/jpg" class="hidden">
                
                <div class="w-16 h-16 mb-6 bg-white/10 rounded-2xl flex items-center justify-center text-5xl">📤</div>
                <p class="text-xl font-medium mb-1">Drop photo here</p>
                <p class="text-zinc-400 text-sm mb-6">or tap to browse</p>
                
                <div class="flex items-center gap-x-4 text-xs text-zinc-500">
                    <span class="px-3 py-1 bg-white/10 rounded-xl">PNG</span>
                    <span class="px-3 py-1 bg-white/10 rounded-xl">JPG</span>
                    <span class="px-3 py-1 bg-white/10 rounded-xl">JPEG</span>
                    <span class="text-zinc-600">•</span>
                    <span>Max 10 MB</span>
                </div>
            </div>
            
            <!-- Preview -->
            <div id="preview-section" class="hidden mt-6">
                <div class="flex items-center justify-between mb-3">
                    <p class="text-sm font-medium text-zinc-400">Your photo</p>
                    <button onclick="clearSelection()" 
                            class="text-zinc-400 hover:text-white flex items-center gap-x-1 text-xs">
                        <span class="text-lg leading-none">×</span> CHANGE
                    </button>
                </div>
                
                <div class="bg-black rounded-2xl overflow-hidden border border-white/10 mb-6">
                    <img id="preview-image" 
                         class="w-full aspect-square object-cover"
                         alt="Preview">
                </div>
                
                <div class="flex justify-between text-sm mb-6">
                    <div>
                        <p id="preview-name" class="font-medium"></p>
                        <p id="preview-size" class="text-zinc-400 text-xs"></p>
                    </div>
                    <div class="text-emerald-400 text-xs font-medium flex items-center gap-x-1">
                        <span class="w-2 h-2 bg-emerald-400 rounded-full"></span>
                        READY
                    </div>
                </div>
                
                <!-- Upload Button -->
                <button onclick="handleUpload()"
                        id="upload-btn"
                        class="w-full h-14 bg-[#fffc00] hover:bg-[#fffc00]/90 text-black font-semibold text-lg rounded-2xl flex items-center justify-center gap-x-2 transition-all active:scale-95">
                    <span>UPLOAD TO STORYQUEUE</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2 2 2 0 01-2 2v-3" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7h3a2 2 0 012 2v9a2 2 0 01-2 2 2 2 0 01-2 2v-3" />
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- Success Message -->
        <div id="success-section" class="hidden mt-6 bg-emerald-900/70 border border-emerald-400/30 rounded-3xl p-6 success-pop">
            <div class="flex items-center gap-x-3 mb-4">
                <div class="text-4xl">✅</div>
                <div>
                    <p class="font-semibold text-xl">Photo uploaded!</p>
                    <p id="uploaded-filename" class="font-mono text-emerald-300 text-sm"></p>
                </div>
            </div>
            <p class="text-emerald-200 text-sm">It is now in the queue.<br>The app will show it in order.</p>
            
            <div class="mt-6 flex gap-x-3">
                <button onclick="resetUI()" 
                        class="flex-1 h-12 bg-white/10 hover:bg-white/20 rounded-2xl font-medium">
                    UPLOAD ANOTHER
                </button>
                <button onclick="window.location.reload()" 
                        class="flex-1 h-12 bg-[#fffc00] text-black rounded-2xl font-medium">
                    DONE
                </button>
            </div>
        </div>
        
        <!-- Status -->
        <div id="status" class="mt-6 text-center text-xs text-zinc-500 flex items-center justify-center gap-x-2"></div>
    </div>
    
    <script>
        /**
         * STORYQUEUE UPLOAD PAGE – PUBLIC VERSION
         * 
         * ONLY basic client-side checks (as you requested):
         * • File type: PNG, JPG or JPEG only
         * • File size: max 10 MB
         * 
         * NO deep content validation, no image corruption check, no nudity filter.
         * The app will handle swiping (delete / share to Snapchat).
         * 
         * 1. Replace the 3 placeholders below with your real values.
         * 2. Your repo can be PUBLIC or PRIVATE – your choice.
         * 3. /storyqueue folder must already exist (empty is fine).
         */
        
        const CONFIG = {
            OWNER: "YOUR_GITHUB_USERNAME",          // ← CHANGE THIS
            REPO: "YOUR_REPO_NAME",                 // ← CHANGE THIS
            TOKEN: "ghp_YOUR_PERSONAL_ACCESS_TOKEN_HERE", // ← CHANGE THIS
            BRANCH: "main"                          // usually "main"
        };
        
        let currentFile = null;
        let objectUrl = null;
        
        // Get next sequential number
        async function getNextNumber() {
            const url = `https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/contents/storyqueue`;
            
            const res = await fetch(url, {
                headers: {
                    'Authorization': `token ${CONFIG.TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            
            if (!res.ok) throw new Error("Could not read queue folder");
            
            const files = await res.json();
            
            let max = 0;
            files.forEach(file => {
                if (file.type === 'file') {
                    const match = file.name.match(/^(\d+)_(\d{12})\.(png|jpg|jpeg)$/i);
                    if (match) {
                        const num = parseInt(match[1], 10);
                        if (num > max) max = num;
                    }
                }
            });
            
            return max + 1;
        }
        
        // Generate timestamp HHMMSSDDMMYY
        function getTimestamp() {
            const d = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            return `${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}${pad(d.getDate())}${pad(d.getMonth() + 1)}${d.getFullYear().toString().slice(2)}`;
        }
        
        // Basic validation – ONLY type + size (as requested)
        function validateFile(file) {
            if (!file) throw new Error("No file selected");
            
            const allowedTypes = ['image/png', 'image/jpeg'];
            if (!allowedTypes.includes(file.type)) {
                throw new Error("Only PNG, JPG and JPEG files are allowed");
            }
            
            if (file.size > 10 * 1024 * 1024) {
                throw new Error("File is too large. Maximum 10 MB allowed.");
            }
            
            return true;
        }
        
        async function handleUpload() {
            const btn = document.getElementById('upload-btn');
            const originalHTML = btn.innerHTML;
            
            try {
                btn.disabled = true;
                btn.innerHTML = `
                    <svg class="animate-spin h-5 w-5 mr-2 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                    UPLOADING...
                `;
                
                document.getElementById('status').innerHTML = 'Uploading to GitHub...';
                
                validateFile(currentFile);
                
                const nextNum = await getNextNumber();
                const timestamp = getTimestamp();
                const ext = currentFile.type === 'image/png' ? 'png' : 'jpg';
                const filename = `${nextNum}_${timestamp}.${ext}`;
                
                // Convert to base64
                const base64 = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = reject;
                    reader.readAsDataURL(currentFile);
                });
                
                const uploadUrl = `https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/contents/storyqueue/${filename}`;
                
                const res = await fetch(uploadUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${CONFIG.TOKEN}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        message: `📸 Upload: ${filename}`,
                        content: base64,
                        branch: CONFIG.BRANCH
                    })
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.message || 'Upload failed');
                }
                
                // Success
                document.getElementById('uploaded-filename').textContent = filename;
                document.getElementById('upload-card').classList.add('hidden');
                document.getElementById('success-section').classList.remove('hidden');
                document.getElementById('status').innerHTML = `<span class="text-emerald-400">✓ Uploaded as ${filename}</span>`;
                
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerHTML = `<span class="text-red-400">⚠️ ${err.message}</span>`;
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        }
        
        function showPreview(file) {
            currentFile = file;
            
            if (objectUrl) URL.revokeObjectURL(objectUrl);
            objectUrl = URL.createObjectURL(file);
            
            document.getElementById('dropzone').classList.add('hidden');
            document.getElementById('preview-section').classList.remove('hidden');
            
            document.getElementById('preview-image').src = objectUrl;
            document.getElementById('preview-name').textContent = file.name;
            document.getElementById('preview-size').textContent = `${(file.size / 1024 / 1024).toFixed(2)} MB`;
        }
        
        function clearSelection() {
            if (objectUrl) URL.revokeObjectURL(objectUrl);
            currentFile = null;
            objectUrl = null;
            document.getElementById('preview-section').classList.add('hidden');
            document.getElementById('dropzone').classList.remove('hidden');
            document.getElementById('file-input').value = '';
        }
        
        function resetUI() {
            clearSelection();
            document.getElementById('success-section').classList.add('hidden');
            document.getElementById('upload-card').classList.remove('hidden');
            document.getElementById('status').innerHTML = '';
        }
        
        function setupDropzone() {
            const dropzone = document.getElementById('dropzone');
            const fileInput = document.getElementById('file-input');
            
            dropzone.addEventListener('click', () => fileInput.click());
            
            fileInput.addEventListener('change', (e) => {
                if (e.target.files && e.target.files[0]) {
                    const file = e.target.files[0];
                    try {
                        validateFile(file);
                        showPreview(file);
                    } catch (err) {
                        document.getElementById('status').innerHTML = `<span class="text-red-400">${err.message}</span>`;
                        fileInput.value = '';
                    }
                }
            });
            
            // Drag & drop
            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropzone.classList.add('dropzone-active');
            });
            
            dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dropzone-active'));
            
            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.classList.remove('dropzone-active');
                if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                    const file = e.dataTransfer.files[0];
                    try {
                        validateFile(file);
                        showPreview(file);
                    } catch (err) {
                        document.getElementById('status').innerHTML = `<span class="text-red-400">${err.message}</span>`;
                    }
                }
            });
        }
        
        window.onload = () => {
            setupDropzone();
            console.log('%c✅ StoryQueue upload page ready – only type + size checks', 'color:#fffc00; font-weight:600');
        };
    </script>
</body>
</html>
